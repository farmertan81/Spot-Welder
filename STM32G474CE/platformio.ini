[env:g474ceu6_stlink]
platform = ststm32
framework = stm32cube
board = nucleo_g474re

board_build.mcu = stm32g474ceu6
board_build.f_cpu = 170000000L
board_build.ldscript = STM32G474CETX_FLASH.ld

# ---------------------------------------------------------------------------
# FLASH TROUBLESHOOTING -- ".data ... MIS-MATCHED!" on upload
# ---------------------------------------------------------------------------
# A "Section .data, range 0x800f6xx -- 0x800f8xx: MIS-MATCHED!" message after
# an upload means the verify step found the flashed bytes did NOT match the
# firmware image -> the chip is very likely still running OLD code, which is
# why a fixed bug appears "not fixed". Do NOT trust the "SUCCESS" line when a
# MIS-MATCHED appears.
#
# Confirm what is actually running: open a serial monitor at 2,000,000 baud and
# power-cycle the STM32. The new firmware prints:
#     BOOT,FW=cal-dblpulse-fix-2
# If that line is absent, the flash did NOT take -- use one of the fixes below.
#
# FIX A -- full chip erase, then re-flash (recommended first):
#   pio run -t erase           # mass-erase the chip
#   pio run -t upload          # program clean
#
# FIX B -- switch to an ST-Link instead of the Black Magic Probe: comment out
# the blackmagic block below and uncomment the stlink block. ST-Link's mass
# erase + verify is generally more reliable for the .data region:
#   upload_protocol = stlink
#   debug_tool = stlink
#   upload_flags = -c reset_config none
#
# FIX C -- power-cycle after flashing: fully unplug the STM32 for ~5 s, plug
# back in, then re-check the BOOT,FW= line before testing calibration.
# ---------------------------------------------------------------------------

#upload_protocol = stlink
#debug_tool = stlink

upload_protocol = blackmagic
debug_tool = blackmagic
upload_port = COM9

monitor_speed = 2000000

build_flags =
    -Wl,-u,_printf_float
    -DHSE_VALUE=8000000