[env:g474ceu6_stlink]
platform = ststm32
board = nucleo_g474re
framework = stm32cube

board_build.mcu = stm32g474ceu6
board_build.f_cpu = 170000000L
board_build.ldscript = STM32G474CETX_FLASH.ld

upload_protocol = blackmagic
debug_tool = blackmagic
upload_port = COM3

monitor_speed = 576000

build_flags =
    -Wl,-u,_printf_float
    -DHSE_VALUE=8000000

; Auto-copy firmware.bin to project root as stm32_firmware.bin after build
; This allows the ESP32-P4 to flash the STM32 from SD card without manual renaming
extra_scripts = post:extra_script.py
