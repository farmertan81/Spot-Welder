[env:g474ceu6_dfu]
platform = ststm32
framework = stm32cube
board = nucleo_g474re

board_build.mcu = stm32g474ceu6
board_build.f_cpu = 170000000L

upload_protocol = custom
monitor_speed = 115200
build_flags = -Wl,-u,_printf_float

upload_command = ${platformio.packages_dir}/tool-dfuutil/bin/dfu-util -a 0 --dfuse-address=0x08000000 -D "$SOURCE"
