[env:g474ceu6_stlink]
platform = ststm32
framework = stm32cube
board = nucleo_g474re

board_build.mcu = stm32g474ceu6
board_build.f_cpu = 170000000L
board_build.ldscript = STM32G474CETX_FLASH.ld

# ---------------------------------------------------------------------------
# FLASH METHOD -- ST-Link (reliable erase + verify)
# ---------------------------------------------------------------------------
# Switched from the Black Magic Probe to ST-Link because BlackMagic was leaving
# the chip with a ".data ... MIS-MATCHED!" verify failure -- the flash did NOT
# take and the MCU kept running OLD code (so fixed bugs looked "not fixed").
#
# ST-Link uses STM32CubeProgrammer under the hood, which mass-erases and
# verifies the whole image cleanly. The upload flags below force a reliable
# connection even if the running firmware is busy or the reset line is noisy:
#   --connect-under-reset : hold the MCU in reset while attaching (defeats a
#                           running program that would otherwise block SWD)
#   --halt                : halt the core before programming
#
# Flash with:
#   pio run -t upload          # erases + programs + verifies in one step
#
# VERIFY THE NEW FIRMWARE IS RUNNING: open a serial monitor at 2,000,000 baud
# and power-cycle the STM32. The new firmware prints:
#     BOOT,FW=cal-dblpulse-fix-2
# If that line is absent, the flash did not take -- re-run the upload.
# ---------------------------------------------------------------------------
upload_protocol = stlink
debug_tool = stlink
upload_flags =
    --connect-under-reset
    --halt

# --- Black Magic Probe fallback (only if no ST-Link is available) ---------
# Comment out the stlink block above and uncomment the three lines below.
#upload_protocol = blackmagic
#debug_tool = blackmagic
#upload_port = COM9

monitor_speed = 2000000

build_flags =
    -Wl,-u,_printf_float
    -DHSE_VALUE=8000000
