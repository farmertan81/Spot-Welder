; PlatformIO Project Configuration
; ESP32-8048S043C Touch Fix Project
;
; This project fixes GT911 touch responsiveness issues including:
; - Double taps being registered
; - Missed taps  
; - Ghost touches
;
; Key fixes applied:
; 1. GT911 INT pin set to GPIO_NUM_NC (fixes interrupt-driven ghost touches)
; 2. I2C clock speed increased to 400kHz (faster touch reads)
; 3. Software debouncing layer in LVGL indev callback
; 4. Increased LVGL memory for 800x480 display
; 5. Proper touch filtering with configurable thresholds

[platformio]
default_envs = esp32-8048S043C

[env]
; ===== ESP-IDF 5.x UPGRADE (enables the RGB-panel bounce buffer) =====
; The stock PlatformIO `espressif32` platform is frozen at Arduino core 2.0.x /
; ESP-IDF 4.4.7, whose esp_lcd_rgb_panel_config_t has NO bounce_buffer_size_px
; field. The community pioarduino fork ships Arduino core 3.x / ESP-IDF 5.x,
; which adds that field, allowing patch_display.py to enable the bounce buffer
; (the proven fix for the scrambled display). Version 55.03.39 = Arduino 3.3.9 /
; ESP-IDF 5.5.4. To revert, restore platformio.ini.idf44.bak (platform = espressif32).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_filters = esp32_exception_decoder
upload_speed = 460800

build_flags =
    -Ofast
    -Wall
    '-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO'
    -D LV_CONF_INCLUDE_SIMPLE
    ; pioarduino/IDF 5.x LDF no longer auto-adds the project include/ dir when
    ; compiling the lvgl library, so point LVGL straight at our lv_conf.h.
    -I include

; NOTE on the firmware-update feature (SD card -> ESP32 / STM32):
;   The SD, SPI and Update libraries used by the dual firmware-update feature
;   are part of the arduino-esp32 framework (bundled). They are pulled in via
;   #include in src/main.cpp and resolved automatically by the LDF. Do NOT add
;   "SD" to lib_deps – the registry "SD" library targets AVR/SAMD and would
;   shadow the correct ESP32 SD driver, breaking the build.
lib_deps = 
    rzeldent/esp32_smartdisplay@^2.0.0

; ===== DISPLAY CORRUPTION FIX (Sunton ESP32-8048S043C / ST7262 RGB panel) =====
; The esp32_smartdisplay library lives under .pio/libdeps (git-ignored and
; re-downloaded on every build), so its ST7262 panel driver cannot be edited
; durably by hand. patch_display.py re-applies two anti-tearing fixes on every
; build, idempotently:
;   Fix 1: add a bounce buffer (20 * DISPLAY_WIDTH px = 20 lines) so the LCD DMA
;          stages pixels through internal SRAM instead of streaming straight from
;          PSRAM (the root cause of the runtime scramble/tear).
;   Fix 2: switch the LVGL draw buffer to FULL render mode (whole-frame flush).
extra_scripts = pre:patch_display.py

; ===========================================================================
; USB upload (use this the FIRST time, and any time the device is on a cable)
; ===========================================================================
; upload_protocol = esptool flashes over the USB serial cable. The USB COM port
; is auto-detected, so you normally do NOT need an upload_port line here. If
; auto-detection ever picks the wrong port, uncomment upload_port below and set
; it to YOUR cable's port (Windows: COMx, e.g. COM5 / Linux: /dev/ttyUSB0 /
; macOS: /dev/cu.usbserial-*). Leave it commented otherwise.
[env:esp32-8048S043C]
board = esp32-8048S043C
upload_protocol = esptool
; upload_port = COM5
upload_speed = 921600
build_flags = 
    ${env.build_flags}
    ; ===== GT911 TOUCH FIX: Disable interrupt pin =====
    ; The GT911 INT pin on many ESP32-8048S043C board revisions is either
    ; not connected or causes ghost touches. Setting to GPIO_NUM_NC forces
    ; polling mode which is more reliable.
    '-D GT911_TOUCH_CONFIG_INT=GPIO_NUM_NC'
    ; ===== I2C SPEED FIX: Increase from 40kHz to 400kHz =====
    ; The default 40kHz is very slow and causes touch lag.
    ; 400kHz is the standard "fast mode" I2C speed.
    '-D GT911_I2C_CONFIG_MASTER_CLK_SPEED=400000'
    ; ===== ADDITIONAL FONTS for touch-first Pulse tab UI =====
    '-D LV_FONT_MONTSERRAT_16=1'
    '-D LV_FONT_MONTSERRAT_18=1'
    '-D LV_FONT_MONTSERRAT_20=1'
    '-D LV_FONT_MONTSERRAT_24=1'
    ; ===== DISABLE THEME GROW/TRANSITIONS for rock-solid touch =====
    '-D LV_THEME_DEFAULT_GROW=0'
    '-D LV_THEME_DEFAULT_TRANSITION_TIME=0'
    ; ===== IRAM-SAFE DISPLAY ISRs (moved here from the OTA-only env) =====
    ; Place the RGB-panel refill and GDMA ISRs in IRAM so they keep running even
    ; while the SPI-flash cache is momentarily disabled (flash erase/program, and
    ; the periodic esp_lcd_rgb_panel_restart() display re-syncs). Without this,
    ; those cache-off windows starve the non-IRAM ISRs, the panel DMA underruns,
    ; AND the UART2 RX ISR is delayed long enough to drop bytes on the STM32 link
    ; (the "garbage after a few seconds" corruption). Keeping them IRAM-safe in
    ; the DEFAULT build protects normal operation, not just OTA.
    ; NOTE: these two -D flags only affect code compiled IN THIS PROJECT. The
    ; matching sdkconfig options below (custom_sdkconfig) are what actually move
    ; the ISRs inside the ESP-IDF libraries to IRAM (see the long note there).
    -DCONFIG_LCD_RGB_ISR_IRAM_SAFE=1
    -DCONFIG_GDMA_ISR_IRAM_SAFE=1

; =============================================================================
; RUNTIME LCD-CORRUPTION ARCHITECTURAL FIX  (sdkconfig / ESP-IDF level)
; =============================================================================
; Root cause (see esp32_rgb_lcd_runtime_bug_research.md): the ST7262 RGB panel
; streams its 800x480x16bpp framebuffer straight out of Octal-PSRAM over the
; shared SPI bus. When WiFi / NVS commits / the CPU instruction cache also hit
; PSRAM/flash, the LCD GDMA channel is starved, its line FIFO underflows, and
; the panel loses sync PERMANENTLY -> scrambled / torn picture.
;
; ===== FULL FIX ENABLED (from-source ESP-IDF rebuild via custom_sdkconfig) =====
; The project folder was renamed "Spotwelder Full" -> "ESP32_8048S043C" so the
; build path no longer contains a space; ESP-IDF's from-source build (which
; rejects whitespace in the project path) now works, so the complete set of
; sdkconfig options below is applied for real.
;
; HOW THIS WORKS: with the Arduino framework the ESP-IDF normally ships as
; PRE-COMPILED static libraries, so a plain -DCONFIG_* define cannot change
; anything inside esp_lcd / gdma / esp_psram. Setting `custom_sdkconfig` makes
; the pioarduino fork RECOMPILE the ESP-IDF libraries from source with these
; options (the first build is slow, ~5-10 min, then cached). This is the only
; way XIP-from-PSRAM and the cache geometry can actually take effect.
;
; EACH OPTION AND WHY IT FIXES THE RUNTIME CORRUPTION:
;   CONFIG_SPIRAM_XIP_FROM_PSRAM=y  -- CRITICAL, the missing half of the fix.
;       Maps .text (code) and .rodata (read-only data) into PSRAM so the CPU no
;       longer fetches instructions from SPI-flash. During a flash write (NVS
;       commit, WiFi credential save) the flash cache is disabled; without XIP
;       the CPU stalls, the LCD refill ISR can't run, the GDMA FIFO underflows
;       and the panel desyncs. With XIP the I-cache stays live across flash
;       writes, so the bounce buffer keeps being serviced. Pairs with the bounce
;       buffer -- neither alone fully covers the flash-write window.
;   CONFIG_SPIRAM_FETCH_INSTRUCTIONS=y / CONFIG_SPIRAM_RODATA=y -- the two halves
;       of XIP-from-PSRAM (instructions + read-only data placed in PSRAM).
;   CONFIG_ESP32S3_DATA_CACHE_64KB=y + CONFIG_ESP32S3_DATA_CACHE_LINE_64B=y --
;       Octal PSRAM bursts 64 bytes at a time. The stock 32-byte cache line
;       splits every 64-byte burst into two fills (wasting ~half the PSRAM
;       bandwidth and risking alignment corruption). A 64 KB cache with 64-byte
;       lines matches the burst size -> fewer misses -> more sustained bandwidth
;       left for the LCD DMA.
;   CONFIG_LCD_RGB_ISR_IRAM_SAFE=y / CONFIG_GDMA_ISR_IRAM_SAFE=y -- place the RGB
;       refill + GDMA ISRs in IRAM so they keep running while the flash cache is
;       disabled. (These finally take real effect now that the IDF is built from
;       source; the matching -D flags above only covered project-level code.)
;   CONFIG_LCD_RGB_RESTART_IN_VSYNC=y -- safety net: if the FIFO ever still
;       underflows, GDMA restarts at the next VBlank so any glitch self-corrects
;       within one frame instead of becoming a permanent scramble.
;   CONFIG_SPIRAM / _MODE_OCT / _SPEED_80M / CONFIG_ESPTOOLPY_FLASHFREQ_80M --
;       pin Octal PSRAM @80 MHz and flash @80 MHz so the rebuilt libraries match
;       this board's hardware (these mirror the stock prebuilt values).
; The bounce buffer (20 lines via internal SRAM) is still applied in the panel
; config by patch_display.py, fb_in_psram=true and PCLK=12 MHz live in the board
; definition (boards/esp32-8048S043C.json). Together with the options below this
; is the COMPLETE architectural fix.
custom_sdkconfig =
    CONFIG_SPIRAM_XIP_FROM_PSRAM=y
    CONFIG_SPIRAM_FETCH_INSTRUCTIONS=y
    CONFIG_SPIRAM_RODATA=y
    CONFIG_ESP32S3_DATA_CACHE_64KB=y
    CONFIG_ESP32S3_DATA_CACHE_LINE_64B=y
    CONFIG_LCD_RGB_RESTART_IN_VSYNC=y
    CONFIG_LCD_RGB_ISR_IRAM_SAFE=y
    CONFIG_GDMA_ISR_IRAM_SAFE=y
    CONFIG_SPIRAM=y
    CONFIG_SPIRAM_MODE_OCT=y
    CONFIG_SPIRAM_SPEED_80M=y
    CONFIG_ESPTOOLPY_FLASHFREQ_80M=y

; ===========================================================================
; OTA (over-the-air) firmware upload over WiFi  -- NO USB CABLE / NO COM PORT
; ===========================================================================
; This environment uploads the SAME firmware over WiFi using espota. It reaches
; the device by its network ADDRESS (mDNS hostname OR IP) -- never a COM/serial
; port. If you ever see espota trying to connect to "COM5" (or any COMx), the
; upload_port below was overridden by a serial port: it MUST be a hostname or an
; IP address for OTA. The port/password below MUST match OTA_PORT / OTA_PASSWORD
; in src/main.cpp (setupOTA()).
;
; -------------------------------------------------------------------------
; TWO-STEP WORKFLOW
; -------------------------------------------------------------------------
;   1) FIRST TIME ONLY -- install the OTA-capable firmware over the USB cable:
;          pio run -e esp32-8048S043C -t upload
;
;   2) Find the device's IP -- open the serial monitor and watch the WiFi log:
;          pio device monitor -b 115200
;      Look for a line like:  "[WiFi] Connected - IP: 192.168.1.50"
;      (mDNS also announces it as  spotwelder.local )
;
;   3) Flash over WiFi (no cable) from then on:
;          pio run -e esp32-8048S043C-ota -t upload
; -------------------------------------------------------------------------
;
; upload_port: leave it as the mDNS hostname (works on most home networks). If
; "spotwelder.local" fails to resolve (some corporate/guest networks and some
; Windows setups block mDNS), comment the hostname line and uncomment the IP
; line, setting it to the IP you found in step 2.
;
; Add `--debug` to upload_flags for verbose espota logging if a transfer fails.
[env:esp32-8048S043C-ota]
extends = env:esp32-8048S043C
; ===== OTA COLOR-LOOP FIX: IRAM-safe RGB-panel & GDMA ISRs =====
; The OTA "color loop" crash is caused by flash erase/program ops disabling the
; SPI-flash cache: the non-IRAM RGB refill / GDMA ISRs cannot run from flash
; during those windows, the panel DMA underruns and the screen cycles solid
; colors (and can fault, so the update never finishes). The fix is to place
; those ISRs in IRAM. The two CONFIG_*_ISR_IRAM_SAFE flags live in the DEFAULT
; [env:esp32-8048S043C] build_flags (they also fix the runtime UART-corruption
; issue on the STM32 link), so this OTA env inherits them automatically via
; `extends` -- no need to repeat them here.
; Paired with the hard display-blank in setupOTA() (src/main.cpp), this makes
; OTA transfers complete reliably without a manual reset.
upload_protocol = espota
upload_port = 192.168.1.77
; upload_port = 192.168.1.50   ; <-- use the device's actual IP if mDNS fails
upload_flags =
    --port=3232
    --auth=spotwelder2024
