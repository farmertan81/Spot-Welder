; PlatformIO Project Configuration
; ESP32-8048S043C Touch Fix Project
;
; This project fixes GT911 touch responsiveness issues including:
; - Double taps being registered
; - Missed taps  
; - Ghost touches
;
; Key fixes applied:
; 1. GT911 INT pin set to GPIO_NUM_NC (fixes interrupt-driven ghost touches)
; 2. I2C clock speed increased to 400kHz (faster touch reads)
; 3. Software debouncing layer in LVGL indev callback
; 4. Increased LVGL memory for 800x480 display
; 5. Proper touch filtering with configurable thresholds

[platformio]
default_envs = esp32-8048S043C

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_filters = esp32_exception_decoder
upload_speed = 460800

build_flags =
    -Ofast
    -Wall
    '-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO'
    -D LV_CONF_INCLUDE_SIMPLE

lib_deps = 
    rzeldent/esp32_smartdisplay@^2.0.0

[env:esp32-8048S043C]
board = esp32-8048S043C
build_flags = 
    ${env.build_flags}
    ; ===== GT911 TOUCH FIX: Disable interrupt pin =====
    ; The GT911 INT pin on many ESP32-8048S043C board revisions is either
    ; not connected or causes ghost touches. Setting to GPIO_NUM_NC forces
    ; polling mode which is more reliable.
    '-D GT911_TOUCH_CONFIG_INT=GPIO_NUM_NC'
    ; ===== I2C SPEED FIX: Increase from 40kHz to 400kHz =====
    ; The default 40kHz is very slow and causes touch lag.
    ; 400kHz is the standard "fast mode" I2C speed.
    '-D GT911_I2C_CONFIG_MASTER_CLK_SPEED=400000'
    ; ===== ADDITIONAL FONTS for touch-first Pulse tab UI =====
    '-D LV_FONT_MONTSERRAT_16=1'
    '-D LV_FONT_MONTSERRAT_18=1'
    '-D LV_FONT_MONTSERRAT_20=1'
    '-D LV_FONT_MONTSERRAT_24=1'
    ; ===== DISABLE THEME GROW/TRANSITIONS for rock-solid touch =====
    '-D LV_THEME_DEFAULT_GROW=0'
    '-D LV_THEME_DEFAULT_TRANSITION_TIME=0'
